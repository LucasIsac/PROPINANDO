name: CI

on:
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Lint
        run: pnpm --filter web lint

      - name: Security audit
        run: pnpm audit --prod

      - name: Run tests
        run: pnpm --filter api test --run --coverage

      - name: Build
        run: pnpm build
